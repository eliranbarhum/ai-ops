gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types text/plain text/css text/javascript application/javascript
           application/json application/x-javascript application/xml
           image/svg+xml font/woff2;

server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://api-gateway:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Forward oauth2-proxy user identity headers to api-gateway
        proxy_set_header X-Forwarded-User              $http_x_forwarded_user;
        proxy_set_header X-Forwarded-Email             $http_x_forwarded_email;
        proxy_set_header X-Forwarded-Preferred-Username $http_x_forwarded_preferred_username;
        proxy_read_timeout 700s;
        proxy_send_timeout 700s;
        proxy_connect_timeout 10s;
    }

    # Dex OIDC — proxied through nginx so Dex needs no extra LoadBalancer IP
    location /dex/ {
        proxy_pass http://dex:5556;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vite hashes asset filenames — safe to cache for a year
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html must always be re-validated (no-cache, not no-store so ETag still works)
    location ~* \.html$ {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
