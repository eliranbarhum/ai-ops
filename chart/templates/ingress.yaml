{{- if .Values.ingress.enabled }}
{{- $portalHost := .Values.portal.url | trimPrefix "https://" | trimPrefix "http://" }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mco
  namespace: {{ include "mco.namespace" . }}
  labels:
    {{- include "mco.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.ingress.certManager }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.certManagerIssuer }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ $portalHost }}
      secretName: mco-tls
  {{- end }}
  rules:
    - host: {{ $portalHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oauth2-proxy
                port:
                  number: 443
{{- end }}
