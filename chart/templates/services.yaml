{{- $ns := include "mco.namespace" . }}
{{- $labels := include "mco.labels" . }}
---
# oauth2-proxy — the only externally-reachable service
# Handles TLS termination, OIDC login, and proxies to the UI
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: {{ $ns }}
  labels:
    app: oauth2-proxy
    {{- $labels | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: oauth2-proxy
  ports:
    - name: https
      port: 443
      targetPort: 8443
    - name: http
      port: 80
      targetPort: 4180
---
# Dex — OIDC identity provider, accessible inside cluster only
apiVersion: v1
kind: Service
metadata:
  name: dex
  namespace: {{ $ns }}
  labels:
    app: dex
    {{- $labels | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: dex
  ports:
    - port: 5556
      targetPort: 5556
---
# UI — ClusterIP only (proxied by oauth2-proxy after auth)
apiVersion: v1
kind: Service
metadata:
  name: ui
  namespace: {{ $ns }}
  labels:
    app: ui
    {{- $labels | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: ui
  ports:
    - port: 3000
      targetPort: 3000
---
# api-gateway — ClusterIP only (auth bypass possible via LoadBalancer)
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: {{ $ns }}
  labels:
    app: api-gateway
    {{- $labels | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - port: 8000
      targetPort: 8000
