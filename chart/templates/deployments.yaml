        {{- $labels | nindent 8 }}
    spec:
      {{- include "mco.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          {{- include "mco.imagePullPolicy" . | nindent 10 }}
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
{{- end }}
{{- if .Values.ollama.enabled }}
---
# ── Ollama (on-prem LLM) ──────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: {{ $ns }}
  labels:
    app: ollama
    {{- $labels | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
        {{- $labels | nindent 8 }}
    spec:
      {{- include "mco.imagePullSecrets" . | nindent 6 }}
      initContainers:
        - name: pull-model
          image: ollama/ollama:latest
          command: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull {{ .Values.ollama.model }} && kill %1"]
          env:
            - name: OLLAMA_MODELS
              value: /models
          volumeMounts:
            - name: model-cache
              mountPath: /models
      containers:
        - name: ollama
          image: ollama/ollama:latest
          {{- include "mco.imagePullPolicy" . | nindent 10 }}
          env:
            - name: OLLAMA_MODELS
              value: /models
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: model-cache
              mountPath: /models
          resources:
            requests:
              cpu: 500m
              memory: 4Gi
            limits:
              cpu: 4000m
              memory: 12Gi
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: ollama-model-cache
{{- end }}
