---
# ── PostgreSQL ────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: {{ $ns }}
  labels:
    app: postgresql
    {{- $labels | nindent 4 }}
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
        {{- $labels | nindent 8 }}
    spec:
      {{- include "mco.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: postgresql
          image: timescale/timescaledb:latest-pg16
          {{- include "mco.imagePullPolicy" . | nindent 10 }}
          env:
            - name: POSTGRES_USER
              value: mco
            - name: POSTGRES_DB
              value: mco
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mco-secrets
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: data-postgresql-0
---
# ── Redis ─────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: {{ $ns }}
  labels:
    app: redis
    {{- $labels | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        {{- $labels | nindent 8 }}
    spec:
      {{- include "mco.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: redis
          image: redis:7
          {{- include "mco.imagePullPolicy" . | nindent 10 }}
          ports:
            - containerPort: 6379
          command: ["redis-server","--appendonly","yes","--dir","/data"]
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: redis-data
---
# ── Dex (OIDC identity provider) ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dex
  namespace: {{ $ns }}
  labels:
    app: dex
    {{- $labels | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dex
  template:
    metadata:
      labels:
        app: dex
        {{- $labels | nindent 8 }}
    spec:
      {{- include "mco.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: dex
          image: ghcr.io/dexidp/dex:v2.39.0
          args: ["dex", "serve", "/etc/dex/config.yaml"]
          ports:
            - containerPort: 5556
          readinessProbe:
            tcpSocket:
              port: 5556
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /etc/dex
            - name: tls
              mountPath: /etc/dex/tls
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: config
          secret:
            secretName: dex-config
        - name: tls
          secret:
            secretName: dex-tls
---
# ── oauth2-proxy (TLS termination + OIDC session) ────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: {{ $ns }}
  labels:
    app: oauth2-proxy
    {{- $labels | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
        {{- $labels | nindent 8 }}
    spec:
      {{- include "mco.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
          args:
            - --provider=oidc
            - --upstream=http://ui:3000
            - --https-address=0.0.0.0:8443
            - --tls-cert-file=/etc/mco-tls/tls.crt
            - --tls-key-file=/etc/mco-tls/tls.key
            - --email-domain=*
            - --cookie-secure=true
            - --skip-provider-button=true
            - --pass-access-token=true
            - --set-xauthrequest=true
            - --pass-user-headers=true
            - --upstream-timeout=700s
            - --skip-auth-route=^/dex/
            - --skip-auth-route=^/api/v1/health
            - --insecure-oidc-allow-unverified-email=true
            - --provider-ca-file=/etc/dex-ca/ca.crt
          envFrom:
            - secretRef:
                name: oauth2proxy-secret
          ports:
            - name: https
              containerPort: 8443
            - name: http-redirect
              containerPort: 4180
          readinessProbe:
            httpGet:
              path: /ping
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: mco-tls
              mountPath: /etc/mco-tls
              readOnly: true
            - name: dex-ca
              mountPath: /etc/dex-ca
              readOnly: true
            - name: redirect-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
        - name: http-redirect
          image: nginx:1.27-alpine
          ports:
            - containerPort: 4180
          volumeMounts:
            - name: redirect-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: mco-tls
          secret:
            secretName: mco-tls
        - name: dex-ca
          configMap:
            name: dex-ca
        - name: redirect-conf
          configMap:
            name: oauth2proxy-redirect
