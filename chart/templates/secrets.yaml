{{- $pgPass := .Values.postgresql.password | default (randAlphaNum 32) }}
{{- $grafanaPass := .Values.grafana.adminPassword | default (randAlphaNum 16) }}
{{- $cookieSecret := randAlphaNum 32 | b64enc }}
{{- $dexClientSecret := randAlphaNum 32 | b64enc }}
{{- $adminPwHash := .Values.auth.adminPassword | htpasswd "admin" }}
---
# MCO core secrets — LLM keys, VMware credentials, DB password
apiVersion: v1
kind: Secret
metadata:
  name: mco-secrets
  namespace: {{ include "mco.namespace" . }}
  labels:
    {{- include "mco.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ $pgPass | quote }}
  POSTGRES_URL: {{ printf "postgresql://mco:%s@postgresql:5432/mco" $pgPass | quote }}
  LLM_PROVIDER: {{ .Values.llm.provider | quote }}
  ANTHROPIC_API_KEY: {{ .Values.llm.anthropicKey | quote }}
  OPENAI_API_KEY: {{ .Values.llm.openaiKey | quote }}
  GEMINI_API_KEY: {{ .Values.llm.geminiKey | quote }}
  OLLAMA_BASE_URL: {{ .Values.llm.ollamaUrl | quote }}
  VCENTER_HOST: {{ .Values.vmware.vcenterHost | quote }}
  VCENTER_USER: {{ .Values.vmware.vcenterUser | quote }}
  VCENTER_PASSWORD: {{ .Values.vmware.vcenterPassword | quote }}
  SDDC_HOST: {{ .Values.vmware.sddcHost | quote }}
  SDDC_USER: {{ .Values.vmware.sddcUser | quote }}
  SDDC_PASSWORD: {{ .Values.vmware.sddcPassword | quote }}
  NSX_HOST: {{ .Values.vmware.nsxHost | quote }}
  NSX_USER: {{ .Values.vmware.nsxUser | quote }}
  NSX_PASSWORD: {{ .Values.vmware.nsxPassword | quote }}
  VROPS_HOST: {{ .Values.vmware.vropsHost | quote }}
  VROPS_USER: {{ .Values.vmware.vropsUser | quote }}
  VROPS_PASSWORD: {{ .Values.vmware.vropsPassword | quote }}
  LOGINSIGHT_HOST: {{ .Values.vmware.logInsightHost | quote }}
  LOGINSIGHT_USER: {{ .Values.vmware.logInsightUser | quote }}
  LOGINSIGHT_PASSWORD: {{ .Values.vmware.logInsightPassword | quote }}
  AD_HOST: {{ .Values.activeDirectory.host | quote }}
  AD_DOMAIN: {{ .Values.activeDirectory.domain | quote }}
  AD_BIND_USER: {{ .Values.activeDirectory.bindUser | quote }}
  AD_BIND_PASSWORD: {{ .Values.activeDirectory.bindPassword | quote }}
  REQUIRE_AUTH: "true"
  ALLOWED_ORIGINS: {{ .Values.portal.url | quote }}
---
# Dex OIDC config (generated at install time)
apiVersion: v1
kind: Secret
metadata:
  name: dex-config
  namespace: {{ include "mco.namespace" . }}
  labels:
    {{- include "mco.labels" . | nindent 4 }}
type: Opaque
stringData:
  config.yaml: |
    issuer: {{ printf "%s/dex" .Values.portal.url }}

    storage:
      type: memory

    web:
      https: 0.0.0.0:5556
      tlsCert: /etc/dex/tls/tls.crt
      tlsKey:  /etc/dex/tls/tls.key

    enablePasswordDB: true

    oauth2:
      skipApprovalScreen: true

    staticClients:
    - id: mco-platform
      redirectURIs:
      - {{ printf "%s/oauth2/callback" .Values.portal.url }}
      name: MCO Platform
      secret: {{ $dexClientSecret | b64dec }}

    staticPasswords:
    - email: {{ .Values.auth.adminEmail | quote }}
      hash: {{ $adminPwHash | quote }}
      username: admin
      userID: "00000000-0000-0000-0000-000000000001"
    {{- if .Values.activeDirectory.host }}

    connectors:
    - type: ldap
      id: ldap
      name: Active Directory
      config:
        host: {{ printf "%s:389" .Values.activeDirectory.host }}
        insecureNoSSL: true
        bindDN: {{ .Values.activeDirectory.bindUser | quote }}
        bindPW: {{ .Values.activeDirectory.bindPassword | quote }}
        usernamePrompt: AD Username
        userSearch:
          baseDN: {{ printf "DC=%s" (.Values.activeDirectory.domain | replace "." ",DC=") }}
          filter: "(objectClass=person)"
          username: sAMAccountName
          idAttr: DN
          emailAttr: userPrincipalName
          nameAttr: displayName
        groupSearch:
          baseDN: {{ printf "DC=%s" (.Values.activeDirectory.domain | replace "." ",DC=") }}
          filter: "(objectClass=group)"
          userMatchers:
          - userAttr: DN
            groupAttr: member
          nameAttr: cn
    {{- end }}
---
# oauth2-proxy env
apiVersion: v1
kind: Secret
metadata:
  name: oauth2proxy-secret
  namespace: {{ include "mco.namespace" . }}
  labels:
    {{- include "mco.labels" . | nindent 4 }}
type: Opaque
stringData:
  OAUTH2_PROXY_CLIENT_ID: "mco-platform"
  OAUTH2_PROXY_CLIENT_SECRET: {{ $dexClientSecret | b64dec }}
  OAUTH2_PROXY_COOKIE_SECRET: {{ $cookieSecret | b64dec }}
  OAUTH2_PROXY_OIDC_ISSUER_URL: {{ printf "%s/dex" .Values.portal.url }}
{{- if .Values.grafana.adminPassword }}
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: {{ include "mco.namespace" . }}
  labels:
    {{- include "mco.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-password: {{ $grafanaPass | quote }}
{{- end }}
