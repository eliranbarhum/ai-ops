---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mco
  namespace: {{ include "mco.namespace" . }}
  labels:
    {{- include "mco.labels" . | nindent 4 }}
---
# vks-broker needs read access to cluster resources for the K8s visibility pages
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mco-k8s-visibility
  labels:
    {{- include "mco.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods","nodes","namespaces","services","persistentvolumeclaims",
                "configmaps","events","serviceaccounts","endpoints","limitranges",
                "resourcequotas","secrets"]
    verbs: ["get","list","watch"]
  - apiGroups: ["apps"]
    resources: ["deployments","replicasets","statefulsets","daemonsets"]
    verbs: ["get","list","watch"]
  - apiGroups: ["batch"]
    resources: ["jobs","cronjobs"]
    verbs: ["get","list","watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses","networkpolicies"]
    verbs: ["get","list","watch","create","update","delete"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get","list","watch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get","list","watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles","rolebindings","clusterroles","clusterrolebindings"]
    verbs: ["get","list","watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods","nodes"]
    verbs: ["get","list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mco-k8s-visibility
  labels:
    {{- include "mco.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mco-k8s-visibility
subjects:
  - kind: ServiceAccount
    name: mco
    namespace: {{ include "mco.namespace" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mco-supervisor-reconnect
  namespace: {{ include "mco.namespace" . }}
  labels:
    {{- include "mco.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["vsphere-credentials"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["kubectl-config"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mco-supervisor-reconnect
  namespace: {{ include "mco.namespace" . }}
  labels:
    {{- include "mco.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mco-supervisor-reconnect
subjects:
  - kind: ServiceAccount
    name: mco
    namespace: {{ include "mco.namespace" . }}
